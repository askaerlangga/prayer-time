name: Build .deb Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PKG=prayer-time_${VERSION}_all

          mkdir -p ${PKG}/DEBIAN
          mkdir -p ${PKG}/usr/lib/prayer-time
          mkdir -p ${PKG}/usr/bin
          mkdir -p ${PKG}/usr/share/applications
          mkdir -p ${PKG}/usr/share/icons/hicolor/scalable/apps

          # Copy application files
          cp main.py ${PKG}/usr/lib/prayer-time/
          cp -r prayer_time ${PKG}/usr/lib/prayer-time/
          cp -r data ${PKG}/usr/lib/prayer-time/

          # Create launcher script
          cat > ${PKG}/usr/bin/prayer-time << 'EOF'
          #!/bin/sh
          exec python3 /usr/lib/prayer-time/main.py "$@"
          EOF
          chmod 755 ${PKG}/usr/bin/prayer-time

          # Install icon
          cp data/icons/icon.svg ${PKG}/usr/share/icons/hicolor/scalable/apps/com.github.aska.PrayerTime.svg

          # Create .desktop entry
          cat > ${PKG}/usr/share/applications/com.github.aska.PrayerTime.desktop << EOF
          [Desktop Entry]
          Name=Prayer Times
          Name[id]=Waktu Salat
          Comment=Desktop prayer times reminder
          Comment[id]=Pengingat waktu salat desktop
          Exec=prayer-time
          Icon=com.github.aska.PrayerTime
          Terminal=false
          Type=Application
          Categories=Utility;
          Keywords=prayer;islam;salat;sholat;adhan;
          StartupNotify=true
          EOF

          # Create control file
          cat > ${PKG}/DEBIAN/control << EOF
          Package: prayer-time
          Version: ${VERSION}
          Architecture: all
          Maintainer: Aska Erlangga
          Depends: python3, python3-gi, python3-requests, gir1.2-gtk-4.0, gir1.2-adw-1, gir1.2-ayatanaappindicator3-0.1
          Recommends: libcanberra-gtk-module, libcanberra-gtk3-module
          Section: utils
          Priority: optional
          Homepage: https://github.com/aska/prayer-time
          Description: Desktop Prayer Times App
           A desktop prayer times application for Linux built using GTK 4 and
           Libadwaita. It runs in the background, displays prayer timetables,
           and alerts you when it is time to pray.
           .
           Features prayer times from Aladhan API and Kemenag (MyQuran ID),
           system tray indicator with countdown, desktop notifications,
           bilingual support (Indonesian/English), and autostart option.
          EOF

          # Create postinst to update icon cache and desktop db
          cat > ${PKG}/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          if command -v update-desktop-database > /dev/null 2>&1; then
              update-desktop-database /usr/share/applications
          fi
          if command -v gtk-update-icon-cache > /dev/null 2>&1; then
              gtk-update-icon-cache -f -t /usr/share/icons/hicolor
          fi
          EOF
          chmod 755 ${PKG}/DEBIAN/postinst

          fakeroot dpkg-deb --build ${PKG}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prayer-time-deb
          path: prayer-time_*.deb
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: prayer-time_*.deb
          generate_release_notes: true
