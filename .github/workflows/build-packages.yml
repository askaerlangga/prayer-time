name: Build Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.1.0)"
        required: false

permissions:
  contents: write

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(python3 -c 'from prayer_time import __version__; print(__version__)')" >> $GITHUB_OUTPUT
          fi

  build-deb:
    runs-on: ubuntu-latest
    needs: set-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Build .deb package
        run: |
          VERSION=${{ needs.set-version.outputs.version }}
          PKG=prayer-time_${VERSION}_all

          mkdir -p ${PKG}/DEBIAN
          mkdir -p ${PKG}/usr/lib/prayer-time
          mkdir -p ${PKG}/usr/bin
          mkdir -p ${PKG}/usr/share/applications
          mkdir -p ${PKG}/usr/share/icons/hicolor/scalable/apps

          cp main.py ${PKG}/usr/lib/prayer-time/
          cp -r prayer_time ${PKG}/usr/lib/prayer-time/
          cp -r data ${PKG}/usr/lib/prayer-time/

          cat > ${PKG}/usr/bin/prayer-time << 'EOF'
          #!/bin/sh
          exec python3 /usr/lib/prayer-time/main.py "$@"
          EOF
          chmod 755 ${PKG}/usr/bin/prayer-time

          cp data/icons/icon.svg ${PKG}/usr/share/icons/hicolor/scalable/apps/com.github.aska.PrayerTime.svg

          cat > ${PKG}/usr/share/applications/com.github.aska.PrayerTime.desktop << EOF
          [Desktop Entry]
          Name=Prayer Times
          Name[id]=Waktu Salat
          Comment=Desktop prayer times reminder
          Comment[id]=Pengingat waktu salat desktop
          Exec=prayer-time
          Icon=com.github.aska.PrayerTime
          Terminal=false
          Type=Application
          Categories=Utility;
          Keywords=prayer;islam;salat;sholat;adhan;
          StartupNotify=true
          EOF

          cat > ${PKG}/DEBIAN/control << EOF
          Package: prayer-time
          Version: ${VERSION}
          Architecture: all
          Maintainer: Aska Erlangga
          Depends: python3, python3-gi, python3-requests, gir1.2-gtk-4.0, gir1.2-adw-1, gir1.2-ayatanaappindicator3-0.1
          Recommends: libcanberra-gtk-module, libcanberra-gtk3-module
          Section: utils
          Priority: optional
          Homepage: https://github.com/askaerlangga/prayer-time
          Description: Desktop Prayer Times App
           A desktop prayer times application for Linux built using GTK 4 and
           Libadwaita. It runs in the background, displays prayer timetables,
           and alerts you when it is time to pray.
           .
           Features prayer times from Aladhan API and Kemenag (MyQuran ID),
           system tray indicator with countdown, desktop notifications,
           bilingual support (Indonesian/English), and autostart option.
          EOF

          cat > ${PKG}/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          if command -v update-desktop-database > /dev/null 2>&1; then
              update-desktop-database /usr/share/applications
          fi
          if command -v gtk-update-icon-cache > /dev/null 2>&1; then
              gtk-update-icon-cache -f -t /usr/share/icons/hicolor
          fi
          EOF
          chmod 755 ${PKG}/DEBIAN/postinst

          fakeroot dpkg-deb --build ${PKG}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prayer-time-deb
          path: prayer-time_*.deb
          retention-days: 30

  build-rpm:
    runs-on: ubuntu-latest
    needs: set-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build .rpm package
        run: |
          VERSION=${{ needs.set-version.outputs.version }}

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p ~/rpmbuild/SOURCES/prayer-time-${VERSION}

          cp main.py ~/rpmbuild/SOURCES/prayer-time-${VERSION}/
          cp -r prayer_time ~/rpmbuild/SOURCES/prayer-time-${VERSION}/
          cp -r data ~/rpmbuild/SOURCES/prayer-time-${VERSION}/

          tar -czf ~/rpmbuild/SOURCES/prayer-time-${VERSION}.tar.gz \
            -C ~/rpmbuild/SOURCES prayer-time-${VERSION}

          cat > ~/rpmbuild/SPECS/prayer-time.spec << EOF
          Name:           prayer-time
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Desktop Prayer Times App
          License:        GPL-3.0
          URL:            https://github.com/askaerlangga/prayer-time
          Source0:        prayer-time-${VERSION}.tar.gz
          BuildArch:      noarch

          Requires:       python3
          Requires:       python3-gobject
          Requires:       python3-requests
          Requires:       gtk4
          Requires:       libadwaita
          Requires:       libayatana-appindicator-gtk3

          %description
          A desktop prayer times application for Linux built using GTK 4 and
          Libadwaita. It runs in the background, displays prayer timetables,
          and alerts you when it is time to pray.

          Features prayer times from Aladhan API and Kemenag (MyQuran ID),
          system tray indicator with countdown, desktop notifications,
          bilingual support (Indonesian/English), and autostart option.

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}/usr/lib/prayer-time
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons/hicolor/scalable/apps

          cp main.py %{buildroot}/usr/lib/prayer-time/
          cp -r prayer_time %{buildroot}/usr/lib/prayer-time/
          cp -r data %{buildroot}/usr/lib/prayer-time/

          cat > %{buildroot}/usr/bin/prayer-time << 'LAUNCHER'
          #!/bin/sh
          exec python3 /usr/lib/prayer-time/main.py "\$@"
          LAUNCHER
          chmod 755 %{buildroot}/usr/bin/prayer-time

          cp data/icons/icon.svg %{buildroot}/usr/share/icons/hicolor/scalable/apps/com.github.aska.PrayerTime.svg

          cat > %{buildroot}/usr/share/applications/com.github.aska.PrayerTime.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Prayer Times
          Name[id]=Waktu Salat
          Comment=Desktop prayer times reminder
          Comment[id]=Pengingat waktu salat desktop
          Exec=prayer-time
          Icon=com.github.aska.PrayerTime
          Terminal=false
          Type=Application
          Categories=Utility;
          Keywords=prayer;islam;salat;sholat;adhan;
          StartupNotify=true
          DESKTOP

          %post
          if command -v update-desktop-database > /dev/null 2>&1; then
              update-desktop-database /usr/share/applications
          fi
          if command -v gtk-update-icon-cache > /dev/null 2>&1; then
              gtk-update-icon-cache -f -t /usr/share/icons/hicolor
          fi

          %files
          /usr/lib/prayer-time/
          /usr/bin/prayer-time
          /usr/share/applications/com.github.aska.PrayerTime.desktop
          /usr/share/icons/hicolor/scalable/apps/com.github.aska.PrayerTime.svg

          %changelog
          * $(date "+%a %b %d %Y") Aska Erlangga <aska@erlangga.dev> - ${VERSION}-1
          - Release ${VERSION}
          EOF

          rpmbuild -bb ~/rpmbuild/SPECS/prayer-time.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prayer-time-rpm
          path: ~/rpmbuild/RPMS/noarch/prayer-time-*.rpm
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [set-version, build-deb, build-rpm]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: prayer-time-deb

      - name: Download rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: prayer-time-rpm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prayer-time_*.deb
            prayer-time-*.rpm
          generate_release_notes: true

  publish-apt-repo:
    runs-on: ubuntu-latest
    needs: [set-version, build-deb, release]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: 'gh-pages'

      - name: Download built .deb package
        uses: actions/download-artifact@v4
        with:
          name: prayer-time-deb
          path: temp-debs

      - name: Copy script from main branch
        run: |
          git show origin/main:scripts/generate_apt_repo.py > generate_apt_repo.py
          git show origin/main:data/apt/key.gpg > apt/key.gpg || true

      - name: Prepare APT structures
        run: |
          mkdir -p apt
          # Copy the new .deb to apt/ folder
          cp temp-debs/prayer-time_*.deb apt/
          # Run the flat repository generator
          python3 generate_apt_repo.py apt
          # Clean up temporary files
          rm -rf temp-debs generate_apt_repo.py

      - name: Import GPG Key and Sign Repositories
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create Signatures
        run: |
          cd apt
          # Remove old signatures
          rm -f Release.gpg InRelease
          # Create detached signature (Release.gpg)
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --detach-sign --armor -o Release.gpg Release
          # Create clear signature (InRelease)
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --clearsign --armor -o InRelease Release
          cd ..

      - name: Commit and Push to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/
          git commit -m "Update APT repository index for version ${{ needs.set-version.outputs.version }}" || exit 0
          git push origin gh-pages
