<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 128 128" width="128" height="128">
  <!--
    Prayer Time App Icon — Variant 13
    Style: Solanum-inspired — physical round object, radial gradient body, crescent on top like a stem
    A clock rendered as a physical puck/disk object sitting on a surface
  -->
  <defs>
    <radialGradient id="body13" cx="38%" cy="32%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#9141ac"/>
      <stop offset="0.4" stop-color="#813d9c"/>
      <stop offset="0.75" stop-color="#613583"/>
      <stop offset="1" stop-color="#3d1a5c"/>
    </radialGradient>
    <radialGradient id="shadow13" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#3d1a5c" stop-opacity="0"/>
      <stop offset="0.8" stop-color="#3d1a5c" stop-opacity="0"/>
      <stop offset="1" stop-color="#3d1a5c" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="face13" cx="40%" cy="35%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#f6f5f4"/>
      <stop offset="1" stop-color="#deddda"/>
    </radialGradient>
    <radialGradient id="moon13" cx="35%" cy="35%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#f9f06b"/>
      <stop offset="0.6" stop-color="#f5c211"/>
      <stop offset="1" stop-color="#aa7b08"/>
    </radialGradient>
  </defs>

  <!-- Outer body — physical puck, offset downward for 3D -->
  <ellipse cx="64" cy="70" rx="56" ry="56" fill="#3d1a5c" opacity="0.6"/>
  <!-- Main body sphere -->
  <circle cx="64" cy="64" r="56" fill="url(#body13)"/>
  <!-- Rim highlight -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="url(#shadow13)" stroke-width="8"/>

  <!-- Inner clock face inset -->
  <circle cx="64" cy="65" r="36" fill="#3d1a5c" opacity="0.5"/>
  <circle cx="64" cy="64" r="36" fill="url(#face13)"/>
  <circle cx="64" cy="64" r="36" fill="none" stroke="#9141ac" stroke-width="1.5"/>

  <!-- Tick marks -->
  <line x1="64" y1="30" x2="64" y2="36" stroke="#9141ac" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="64" x2="94" y2="64" stroke="#c0bfbc" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="98" x2="64" y2="92" stroke="#c0bfbc" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="64" x2="34" y2="64" stroke="#c0bfbc" stroke-width="2" stroke-linecap="round"/>
  <!-- Minor ticks -->
  <line x1="89.4" y1="38.6" x2="87" y2="43" stroke="#deddda" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38.6" y1="38.6" x2="41" y2="43" stroke="#deddda" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="89.4" y1="89.4" x2="87" y2="85" stroke="#deddda" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38.6" y1="89.4" x2="41" y2="85" stroke="#deddda" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hands -->
  <line x1="64" y1="64" x2="79" y2="51" stroke="#9141ac" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="64" y2="42" stroke="#241f31" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="58" y2="80" stroke="#e01b24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="64" cy="64" r="5" fill="#813d9c"/>
  <circle cx="64" cy="64" r="2.5" fill="#f6f5f4"/>

  <!-- Crescent + star on top (like Solanum's tomato stem) -->
  <circle cx="64" cy="16" r="11" fill="url(#moon13)"/>
  <circle cx="69" cy="12.5" r="9.5" fill="#613583"/>
  <polygon points="72,7 73.5,11 77.5,11 74.3,13.5 75.5,17.5 72,15 68.5,17.5 69.7,13.5 66.5,11 70.5,11" fill="#f5c211" transform="scale(0.7) translate(34,-4)"/>
</svg>
